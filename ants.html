<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ant Colony Transport</title>
<style>
  body { margin: 0; padding: 0; overflow: hidden; background: #111; }
  canvas { display: block; }
  #controls {
    position: fixed; top: 12px; right: 12px; z-index: 10;
    display: flex; flex-direction: column; gap: 5px;
    font: 13px/1.4 system-ui, sans-serif; color: #ccc;
    background: rgba(0,0,0,0.65); padding: 10px 14px;
    border-radius: 6px; user-select: none; min-width: 220px;
  }
  .row { display: flex; align-items: center; gap: 8px; }
  .row label { min-width: 90px; font-size: 12px; }
  .row input[type=range] { flex: 1; accent-color: #888; }
  .val { min-width: 40px; text-align: right; font-size: 12px; font-family: monospace; }
  #controls button {
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
    color: #ccc; font: 13px/1 system-ui, sans-serif; padding: 5px 12px;
    border-radius: 4px; cursor: pointer; margin-top: 4px;
  }
  #controls button:hover { background: rgba(255,255,255,0.22); }
  #info {
    position: fixed; bottom: 12px; left: 12px; z-index: 10;
    font: 12px/1.5 monospace; color: #777;
    background: rgba(0,0,0,0.5); padding: 6px 10px; border-radius: 4px;
  }
</style>
</head>
<body>
<div id="controls">
  <div class="row"><label>Ants</label><input id="sAnts" type="range" min="50" max="500" value="250"><span class="val" id="vAnts">250</span></div>
  <div class="row"><label>Push force</label><input id="sForce" type="range" min="1" max="30" value="12"><span class="val" id="vForce">0.12</span></div>
  <div class="row"><label>Phero decay</label><input id="sDecay" type="range" min="980" max="999" value="995"><span class="val" id="vDecay">.995</span></div>
  <div class="row"><label>Speed</label><input id="sSpeed" type="range" min="1" max="8" value="1"><span class="val" id="vSpeed">1x</span></div>
  <div class="row"><label>Trail attract</label><input id="sTrail" type="range" min="0" max="50" value="10"><span class="val" id="vTrail">1.0</span></div>
  <div class="row"><label>Push attract</label><input id="sPush" type="range" min="0" max="50" value="25"><span class="val" id="vPush">2.5</span></div>
  <div class="row"><label>Return home</label><input id="sReturn" type="range" min="0" max="50" value="15"><span class="val" id="vReturn">0.15</span></div>
  <div class="row"><label>Lose interest</label><input id="sLose" type="range" min="0" max="100" value="50"><span class="val" id="vLose">0.50</span></div>
  <div class="row"><label>Barrier wall</label><input id="cbWall" type="checkbox" checked></div>
  <button id="btnReset">Reset</button>
</div>
<div id="info"></div>
<canvas id="c"></canvas>
<script>

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const info = document.getElementById('info');

// ===================== CONFIGURATION =====================

const CFG = {
  cellSize: 6,
  antCount: 250,
  antSpeed: 1.5,
  antSize: 2.5,
  pushForce: 0.12,
  contactDist: 8,
  pheroDecay: 0.995,
  pheroDiffuse: 0.1,
  trailDeposit: 0.4,
  pushDeposit: 1.0,
  bodyMass: 85,
  bodyInertia: 175000,
  bodyLinDrag: 0.93,
  bodyAngDrag: 0.91,
  goalBias: 0.12,
  wanderNoise: 0.5,
  stepsPerFrame: 1,
  gapHeight: 55,
  returnHomeStrength: 0.15,
  trailAttraction: 1.0,
  pushAttraction: 2.5,
  loseInterest: 0.5
};

// ===================== STATE =====================

let W, H, cols, rows;
let trailGrid, pushGrid, trailBuf, pushBuf;
let pheroCanvas, pheroCtx, pheroImg;
let ants = [];
let body = {};
let walls = [];
let nest = {};
let wallEnabled = true;
let frameCount = 0;
let fps = 0, lastFpsTime = 0, fpsFrames = 0;

// I-shape parts relative to body center (geometric center of bounding box)
// Top bar: 80x14, Stem: 14x82, Bottom bar: 80x14
// Bounding box: 80 wide x 110 tall, centered at (0,0)
const BODY_PARTS = [
  { cx: 0, cy: -48, hw: 40, hh: 7 },
  { cx: 0, cy:   0, hw:  7, hh: 41 },
  { cx: 0, cy:  48, hw: 17.5, hh: 7 }
];

// ===================== CANVAS SETUP =====================

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cols = Math.ceil(W / CFG.cellSize);
  rows = Math.ceil(H / CFG.cellSize);
  trailGrid = new Float32Array(cols * rows);
  pushGrid  = new Float32Array(cols * rows);
  trailBuf  = new Float32Array(cols * rows);
  pushBuf   = new Float32Array(cols * rows);
  pheroCanvas = document.createElement('canvas');
  pheroCanvas.width = cols;
  pheroCanvas.height = rows;
  pheroCtx = pheroCanvas.getContext('2d');
  pheroImg = pheroCtx.createImageData(cols, rows);
  initWalls();
}

// ===================== PHEROMONE GRID =====================

function gIdx(c, r) { return r * cols + c; }

function deposit(x, y, grid, amt) {
  const c = (x / CFG.cellSize) | 0, r = (y / CFG.cellSize) | 0;
  if (c >= 0 && c < cols && r >= 0 && r < rows) grid[gIdx(c, r)] += amt;
}

function sample(x, y, grid) {
  const c = (x / CFG.cellSize) | 0, r = (y / CFG.cellSize) | 0;
  if (c >= 0 && c < cols && r >= 0 && r < rows) return grid[gIdx(c, r)];
  return 0;
}

function gradient(x, y, grid) {
  const c = (x / CFG.cellSize) | 0, r = (y / CFG.cellSize) | 0;
  if (c < 1 || c >= cols - 1 || r < 1 || r >= rows - 1) return [0, 0];
  return [
    grid[gIdx(c + 1, r)] - grid[gIdx(c - 1, r)],
    grid[gIdx(c, r + 1)] - grid[gIdx(c, r - 1)]
  ];
}

function diffuseDecay() {
  const decay = CFG.pheroDecay;
  const d = CFG.pheroDiffuse;
  const w = 1 - d;
  const q = d * 0.25;
  for (let r = 1; r < rows - 1; r++) {
    for (let c = 1; c < cols - 1; c++) {
      const i = gIdx(c, r);
      trailBuf[i] = (w * trailGrid[i] + q * (
        trailGrid[gIdx(c-1,r)] + trailGrid[gIdx(c+1,r)] +
        trailGrid[gIdx(c,r-1)] + trailGrid[gIdx(c,r+1)])) * decay;
      pushBuf[i] = (w * pushGrid[i] + q * (
        pushGrid[gIdx(c-1,r)] + pushGrid[gIdx(c+1,r)] +
        pushGrid[gIdx(c,r-1)] + pushGrid[gIdx(c,r+1)])) * decay;
    }
  }
  for (let c = 0; c < cols; c++) {
    trailBuf[gIdx(c, 0)] = trailGrid[gIdx(c, 0)] * decay;
    pushBuf[gIdx(c, 0)]  = pushGrid[gIdx(c, 0)] * decay;
    trailBuf[gIdx(c, rows-1)] = trailGrid[gIdx(c, rows-1)] * decay;
    pushBuf[gIdx(c, rows-1)]  = pushGrid[gIdx(c, rows-1)] * decay;
  }
  for (let r = 1; r < rows - 1; r++) {
    trailBuf[gIdx(0, r)] = trailGrid[gIdx(0, r)] * decay;
    pushBuf[gIdx(0, r)]  = pushGrid[gIdx(0, r)] * decay;
    trailBuf[gIdx(cols-1, r)] = trailGrid[gIdx(cols-1, r)] * decay;
    pushBuf[gIdx(cols-1, r)]  = pushGrid[gIdx(cols-1, r)] * decay;
  }
  let tmp;
  tmp = trailGrid; trailGrid = trailBuf; trailBuf = tmp;
  tmp = pushGrid;  pushGrid  = pushBuf;  pushBuf  = tmp;
}

// ===================== RIGID BODY (I-SHAPE) =====================

function initBody() {
  body = {
    x: W * 0.25, y: H * 0.5,
    angle: 0, vx: 0, vy: 0, angVel: 0,
    fx: 0, fy: 0, torque: 0
  };
}

function localToWorld(lx, ly) {
  const c = Math.cos(body.angle), s = Math.sin(body.angle);
  return [body.x + lx * c - ly * s, body.y + lx * s + ly * c];
}

function worldToLocal(wx, wy) {
  const dx = wx - body.x, dy = wy - body.y;
  const c = Math.cos(-body.angle), s = Math.sin(-body.angle);
  return [dx * c - dy * s, dx * s + dy * c];
}

function sdBox(px, py, cx, cy, hw, hh) {
  const dx = Math.abs(px - cx) - hw;
  const dy = Math.abs(py - cy) - hh;
  const outside = Math.sqrt(Math.max(dx, 0) ** 2 + Math.max(dy, 0) ** 2);
  return outside + Math.min(Math.max(dx, dy), 0);
}

function distToBody(wx, wy) {
  const [lx, ly] = worldToLocal(wx, wy);
  let min = Infinity;
  for (const p of BODY_PARTS) min = Math.min(min, sdBox(lx, ly, p.cx, p.cy, p.hw, p.hh));
  return min;
}

function addForce(fx, fy, wx, wy) {
  body.fx += fx;
  body.fy += fy;
  const rx = wx - body.x, ry = wy - body.y;
  body.torque += rx * fy - ry * fx;
}

function getBodySamplePoints() {
  const pts = [];
  for (const p of BODY_PARTS) {
    const x0 = p.cx - p.hw, x1 = p.cx + p.hw;
    const y0 = p.cy - p.hh, y1 = p.cy + p.hh;
    const nx = Math.max(2, Math.ceil(p.hw * 2 / 12));
    const ny = Math.max(2, Math.ceil(p.hh * 2 / 12));
    for (let i = 0; i <= nx; i++) {
      const x = x0 + (x1 - x0) * i / nx;
      pts.push(localToWorld(x, y0));
      pts.push(localToWorld(x, y1));
    }
    for (let j = 1; j < ny; j++) {
      const y = y0 + (y1 - y0) * j / ny;
      pts.push(localToWorld(x0, y));
      pts.push(localToWorld(x1, y));
    }
  }
  return pts;
}

function updateBody() {
  const m = CFG.bodyMass, I = CFG.bodyInertia;
  body.vx += body.fx / m;
  body.vy += body.fy / m;
  body.angVel += body.torque / I;
  body.vx *= CFG.bodyLinDrag;
  body.vy *= CFG.bodyLinDrag;
  body.angVel *= CFG.bodyAngDrag;
  body.x += body.vx;
  body.y += body.vy;
  body.angle += body.angVel;
  body.fx = body.fy = body.torque = 0;

  resolveWallCollisions();
  resolveBounds();
}

// ===================== WALLS =====================

function initWalls() {
  const wallX = W * 0.55;
  const wall2X = wallX - 100;
  const wallW = 12;
  const gapH = CFG.gapHeight;
  const gapTop = H / 2 - gapH / 2;
  const gapBot = H / 2 + gapH / 2;
  walls = [
    { x: wallX, y: 0,      w: wallW, h: gapTop },
    { x: wallX, y: gapBot,  w: wallW, h: H - gapBot },
    { x: wall2X, y: 0,      w: wallW, h: gapTop },
    { x: wall2X, y: gapBot,  w: wallW, h: H - gapBot }
  ];
  nest = { x: W - 40, y: H / 2, r: 30 };
}

function pointInRect(px, py, r) {
  return px > r.x && px < r.x + r.w && py > r.y && py < r.y + r.h;
}

function resolveWallCollisions() {
  for (let iter = 0; iter < 3; iter++) {
    let moved = false;
    const pts = getBodySamplePoints();
    for (const wall of activeWalls()) {
      let bestDx = 0, bestDy = 0, bestPen = 0;
      for (const [px, py] of pts) {
        if (!pointInRect(px, py, wall)) continue;
        const pL = px - wall.x;
        const pR = wall.x + wall.w - px;
        const pT = py - wall.y;
        const pB = wall.y + wall.h - py;
        const minP = Math.min(pL, pR, pT, pB);
        let dx = 0, dy = 0;
        if (minP === pL) dx = -pL;
        else if (minP === pR) dx = pR;
        else if (minP === pT) dy = -pT;
        else dy = pB;
        const pen = Math.abs(dx) + Math.abs(dy);
        if (pen > bestPen) { bestPen = pen; bestDx = dx; bestDy = dy; }
      }
      if (bestPen > 0.1) {
        body.x += bestDx;
        body.y += bestDy;
        if (bestDx !== 0) body.vx *= -0.15;
        if (bestDy !== 0) body.vy *= -0.15;
        body.angVel *= 0.95;
        moved = true;
      }
    }
    if (!moved) break;
  }
}

function resolveBounds() {
  const pts = getBodySamplePoints();
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const [px, py] of pts) {
    if (px < minX) minX = px;
    if (px > maxX) maxX = px;
    if (py < minY) minY = py;
    if (py > maxY) maxY = py;
  }
  if (minX < 0) { body.x -= minX; body.vx = Math.abs(body.vx) * 0.2; }
  if (maxX > W) { body.x -= maxX - W; body.vx = -Math.abs(body.vx) * 0.2; }
  if (minY < 0) { body.y -= minY; body.vy = Math.abs(body.vy) * 0.2; }
  if (maxY > H) { body.y -= maxY - H; body.vy = -Math.abs(body.vy) * 0.2; }
}

// ===================== ANTS =====================

function createAnt() {
  const a = Math.random() * Math.PI * 2;
  const spd = CFG.antSpeed * (0.8 + Math.random() * 0.4);
  return {
    x: Math.random() * W,
    y: Math.random() * H,
    vx: Math.cos(a) * spd,
    vy: Math.sin(a) * spd,
    speed: spd,
    state: 0, // 0=wander, 1=push, 2=return home, 3=random push
    pushDx: 0, pushDy: 0,
    attachLx: 0, attachLy: 0,
    timer: 0,
    progress: 0
  };
}

function spawnSafe() {
  for (let tries = 0; tries < 20; tries++) {
    const ant = createAnt();
    if (distToBody(ant.x, ant.y) > 20) {
      let inWall = false;
      for (const w of activeWalls()) if (pointInRect(ant.x, ant.y, w)) inWall = true;
      if (!inWall) return ant;
    }
  }
  return createAnt();
}

function initAnts() {
  ants = [];
  for (let i = 0; i < CFG.antCount; i++) ants.push(spawnSafe());
}

// States: 0=wander (no pheromone, follows green+blue)
//         1=push  (attached to body, emits blue, biased toward nest)
//         2=return home (emits green, steers toward nest → state 0 at nest)
//         3=random push (attached to body, pushes random direction, lost interest in nest)

function updateAnt(ant) {
  const dist = distToBody(ant.x, ant.y);

  // ---- STATE 3: RANDOM PUSH (lost interest) ----
  // ---- STATE 1: PUSHING ----
  if (ant.state === 1 || ant.state === 3) {
    const [wx, wy] = localToWorld(ant.attachLx, ant.attachLy);
    ant.x = wx;
    ant.y = wy;

    if (ant.state === 1) {
      // Rotate push direction toward nest
      const toNestX = nest.x - wx, toNestY = nest.y - wy;
      const toNestLen = Math.sqrt(toNestX * toNestX + toNestY * toNestY);
      if (toNestLen > 1) {
        ant.pushDx += (toNestX / toNestLen - ant.pushDx) * CFG.goalBias;
        ant.pushDy += (toNestY / toNestLen - ant.pushDy) * CFG.goalBias;
        const pLen = Math.sqrt(ant.pushDx * ant.pushDx + ant.pushDy * ant.pushDy);
        ant.pushDx /= pLen;
        ant.pushDy /= pLen;
      }

      // Track progress toward nest (dot product of body velocity with nest direction)
      if (toNestLen > 1) {
        const nestDirX = toNestX / toNestLen, nestDirY = toNestY / toNestLen;
        const progressThisTick = body.vx * nestDirX + body.vy * nestDirY;
        ant.progress = ant.progress * 0.5 + progressThisTick * 0.5;
      }

      // Lose interest if not making progress
      if (ant.timer > 0 && ant.progress < 0.01 * (1 - CFG.loseInterest) && Math.random() < 0.01 * CFG.loseInterest) {
        ant.state = 3;
        ant.pushDx = -toNestX / toNestLen;
        ant.pushDy = -toNestY / toNestLen;
        ant.timer = 0;
      }
    } else {
      // State 3: slowly rotate push direction randomly
      const a = Math.atan2(ant.pushDy, ant.pushDx) + (Math.random() - 0.5) * 0.15;
      ant.pushDx = Math.cos(a);
      ant.pushDy = Math.sin(a);
    }

    addForce(ant.pushDx * CFG.pushForce, ant.pushDy * CFG.pushForce, wx, wy);
    deposit(ant.x, ant.y, pushGrid, CFG.pushDeposit);

    ant.timer++;
    const detachChance = ant.timer > 250 ? 0.015 : 0.002;
    let forceDetach = false;
    for (const wall of activeWalls()) if (pointInRect(ant.x, ant.y, wall)) forceDetach = true;
    if (ant.x < 2 || ant.x > W - 2 || ant.y < 2 || ant.y > H - 2) forceDetach = true;

    if (forceDetach || Math.random() < detachChance) {
      ant.state = 0;
      ant.timer = -80;
      ant.progress = 0;
      const a = Math.random() * Math.PI * 2;
      ant.vx = Math.cos(a) * ant.speed;
      ant.vy = Math.sin(a) * ant.speed;
      if (forceDetach) {
        ant.x = Math.random() * W * 0.4;
        ant.y = Math.random() * H;
      }
    }
    return;
  }

  // ---- STATE 2: RETURN HOME ----
  if (ant.state === 2) {
    deposit(ant.x, ant.y, trailGrid, CFG.trailDeposit);

    let heading = Math.atan2(ant.vy, ant.vx);
    heading += (Math.random() - 0.5) * CFG.wanderNoise * 0.8;

    // Steer toward nest
    const toNest = Math.atan2(nest.y - ant.y, nest.x - ant.x);
    let diff = toNest - heading;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    heading += diff * CFG.returnHomeStrength;

    ant.vx = Math.cos(heading) * ant.speed;
    ant.vy = Math.sin(heading) * ant.speed;

    ant.x += ant.vx;
    ant.y += ant.vy;

    antWallBounce(ant);

    // Reached nest → back to wander
    const ndx = ant.x - nest.x, ndy = ant.y - nest.y;
    if (ndx * ndx + ndy * ndy < nest.r * nest.r) {
      ant.state = 0;
      ant.timer = 0;
    }
    return;
  }

  // ---- STATE 0: WANDER ----
  ant.timer++;
  let heading = Math.atan2(ant.vy, ant.vx);

  // Pheromone sensing (disabled during post-detach cooldown)
  if (ant.timer >= 0) {
    const SD = 14, SA = 0.5;
    const phAt = (x, y) => sample(x, y, trailGrid) * CFG.trailAttraction + sample(x, y, pushGrid) * CFG.pushAttraction;
    const sL = phAt(ant.x + Math.cos(heading - SA) * SD, ant.y + Math.sin(heading - SA) * SD);
    const sC = phAt(ant.x + Math.cos(heading)      * SD, ant.y + Math.sin(heading)      * SD);
    const sR = phAt(ant.x + Math.cos(heading + SA) * SD, ant.y + Math.sin(heading + SA) * SD);

    const maxPh = Math.max(sL, sC, sR);
    const turnAmt = 0.3 * Math.min(maxPh, 1);
    if (sL > sC && sL > sR) heading -= turnAmt;
    else if (sR > sC && sR > sL) heading += turnAmt;
  }

  heading += (Math.random() - 0.5) * CFG.wanderNoise;

  ant.vx = Math.cos(heading) * ant.speed;
  ant.vy = Math.sin(heading) * ant.speed;

  // No pheromone deposit while wandering

  // Contact with body: 75% push, 25% return home
  if (dist < CFG.contactDist) {
    if (Math.random() < 0.25) {
      ant.state = 2;
      ant.vx = ant.speed;
      ant.vy = (Math.random() - 0.5) * ant.speed * 0.3;
    } else {
      ant.state = 1;
      ant.timer = 0;
      let len = Math.sqrt(ant.vx * ant.vx + ant.vy * ant.vy);
      if (len > 0.01) {
        ant.pushDx = ant.vx / len;
        ant.pushDy = ant.vy / len;
      } else {
        ant.pushDx = 1; ant.pushDy = 0;
      }
      const [lx, ly] = worldToLocal(ant.x, ant.y);
      ant.attachLx = lx;
      ant.attachLy = ly;
    }
    return;
  }

  ant.x += ant.vx;
  ant.y += ant.vy;

  antWallBounce(ant);
}

function antWallBounce(ant) {
  // Gentle wall avoidance
  for (const wall of activeWalls()) {
    const nearX = ant.x > wall.x - 25 && ant.x < wall.x + wall.w + 25;
    const nearY = ant.y > wall.y - 10 && ant.y < wall.y + wall.h + 10;
    if (nearX && nearY) {
      if (ant.x < wall.x + wall.w / 2) ant.vx -= 0.2;
      else ant.vx += 0.2;
    }
  }

  // Hard wall collision
  for (const wall of activeWalls()) {
    if (pointInRect(ant.x, ant.y, wall)) {
      if (ant.vx > 0) ant.x = wall.x - 1;
      else ant.x = wall.x + wall.w + 1;
      ant.vx *= -0.5;
    }
  }

  // Boundary bounce
  const m = 4;
  if (ant.x < m) { ant.x = m; ant.vx = Math.abs(ant.vx); }
  if (ant.x > W - m) { ant.x = W - m; ant.vx = -Math.abs(ant.vx); }
  if (ant.y < m) { ant.y = m; ant.vy = Math.abs(ant.vy); }
  if (ant.y > H - m) { ant.y = H - m; ant.vy = -Math.abs(ant.vy); }
}

// ===================== RENDERING =====================

function renderPhero() {
  const data = pheroImg.data;
  for (let i = 0, n = cols * rows; i < n; i++) {
    const t = trailGrid[i], p = pushGrid[i];
    const tv = Math.min(t * 60, 180) | 0;
    const pv = Math.min(p * 60, 220) | 0;
    const pi = i << 2;
    data[pi]     = pv * 0.15 | 0;
    data[pi + 1] = tv;
    data[pi + 2] = pv;
    data[pi + 3] = Math.min(Math.max(tv, pv) * 0.7, 160) | 0;
  }
  pheroCtx.putImageData(pheroImg, 0, 0);
  ctx.save();
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(pheroCanvas, 0, 0, W, H);
  ctx.restore();
}

function activeWalls() {
  return wallEnabled ? walls : [];
}

function renderWalls() {
  if (wallEnabled) {
    ctx.fillStyle = '#444';
    for (const w of walls) ctx.fillRect(w.x, w.y, w.w, w.h);

    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    for (let i = 0; i < walls.length; i += 2) {
      const wx = walls[i].x, ww = walls[i].w;
      const gapTop = walls[i].y + walls[i].h;
      const gapBot = walls[i + 1].y;
      ctx.moveTo(wx, gapTop);
      ctx.lineTo(wx + ww, gapTop);
      ctx.moveTo(wx, gapBot);
      ctx.lineTo(wx + ww, gapBot);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Nest
  ctx.beginPath();
  ctx.arc(nest.x, nest.y, nest.r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '12px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('nest', nest.x, nest.y);
}

function renderBody() {
  ctx.save();
  ctx.translate(body.x, body.y);
  ctx.rotate(body.angle);
  ctx.fillStyle = '#cc3333';
  for (const p of BODY_PARTS) {
    ctx.fillRect(p.cx - p.hw, p.cy - p.hh, p.hw * 2, p.hh * 2);
  }
  ctx.restore();
}

const STATE_COLORS = ['#4a9eff', '#ff4040', '#40dd40', '#ff8c00'];
const STATE_NAMES  = ['Wander', 'Push', 'Return home', 'Random push'];

function renderLegend() {
  const x = W - 14, lineH = 18, dotR = 5;
  const y0 = H - STATE_NAMES.length * lineH - 10;
  ctx.font = '12px system-ui, sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < STATE_NAMES.length; i++) {
    const cy = y0 + i * lineH + lineH / 2;
    ctx.fillStyle = STATE_COLORS[i];
    ctx.beginPath();
    ctx.arc(x, cy, dotR, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#999';
    ctx.fillText(STATE_NAMES[i], x - dotR - 6, cy);
  }
}

function renderAnts() {
  const r = CFG.antSize;
  const colors = STATE_COLORS;
  for (let s = 0; s < 4; s++) {
    ctx.beginPath();
    ctx.fillStyle = colors[s];
    for (const ant of ants) {
      if (ant.state !== s) continue;
      ctx.moveTo(ant.x + r, ant.y);
      ctx.arc(ant.x, ant.y, r, 0, Math.PI * 2);
    }
    ctx.fill();
  }

  // Draw push direction vectors for pushers (states 1 and 3)
  const vecLen = 8;
  ctx.lineWidth = 1.2;
  for (const s of [1, 3]) {
    ctx.strokeStyle = colors[s];
    ctx.beginPath();
    for (const ant of ants) {
      if (ant.state !== s) continue;
      ctx.moveTo(ant.x, ant.y);
      ctx.lineTo(ant.x + ant.pushDx * vecLen, ant.y + ant.pushDy * vecLen);
    }
    ctx.stroke();
  }
}

function renderInfo() {
  fpsFrames++;
  const now = performance.now();
  if (now - lastFpsTime > 500) {
    fps = (fpsFrames / (now - lastFpsTime) * 1000) | 0;
    lastFpsTime = now;
    fpsFrames = 0;
  }
  const pushing = ants.filter(a => a.state === 1).length;
  const homing = ants.filter(a => a.state === 2).length;
  const randPush = ants.filter(a => a.state === 3).length;
  const wandering = ants.length - pushing - homing - randPush;
  const deg = ((body.angle * 180 / Math.PI) % 360).toFixed(1);
  const speed = Math.sqrt(body.vx * body.vx + body.vy * body.vy).toFixed(2);
  info.textContent = `${fps} fps | push: ${pushing} rand: ${randPush} home: ${homing} wander: ${wandering} | angle: ${deg}° | speed: ${speed}`;
}

// ===================== SIMULATION STEP =====================

function step() {
  for (const ant of ants) updateAnt(ant);
  updateBody();
  diffuseDecay();
  frameCount++;
}

// ===================== MAIN LOOP =====================

function frame() {
  for (let i = 0; i < CFG.stepsPerFrame; i++) step();

  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);
  renderPhero();
  renderWalls();
  renderBody();
  renderAnts();
  renderLegend();
  renderInfo();

  requestAnimationFrame(frame);
}

// ===================== CONTROLS =====================

function bindControls() {
  const s = (id) => document.getElementById(id);

  s('sAnts').oninput = function() {
    s('vAnts').textContent = this.value;
    const target = +this.value;
    while (ants.length < target) ants.push(spawnSafe());
    while (ants.length > target) ants.pop();
    CFG.antCount = target;
  };

  s('sForce').oninput = function() {
    CFG.pushForce = +this.value / 100;
    s('vForce').textContent = CFG.pushForce.toFixed(2);
  };

  s('sDecay').oninput = function() {
    CFG.pheroDecay = +this.value / 1000;
    s('vDecay').textContent = '.' + this.value;
  };

  s('sSpeed').oninput = function() {
    CFG.stepsPerFrame = +this.value;
    s('vSpeed').textContent = this.value + 'x';
  };

  s('sTrail').oninput = function() {
    CFG.trailAttraction = +this.value / 10;
    s('vTrail').textContent = CFG.trailAttraction.toFixed(1);
  };

  s('sPush').oninput = function() {
    CFG.pushAttraction = +this.value / 10;
    s('vPush').textContent = CFG.pushAttraction.toFixed(1);
  };

  s('sReturn').oninput = function() {
    CFG.returnHomeStrength = +this.value / 100;
    s('vReturn').textContent = CFG.returnHomeStrength.toFixed(2);
  };

  s('sLose').oninput = function() {
    CFG.loseInterest = +this.value / 100;
    s('vLose').textContent = CFG.loseInterest.toFixed(2);
  };

  s('cbWall').onchange = function() {
    wallEnabled = this.checked;
  };

  s('btnReset').onclick = function() {
    trailGrid.fill(0);
    pushGrid.fill(0);
    initBody();
    initAnts();
  };
}

// ===================== MOUSE INTERACTION =====================

let drag = null; // { type: 'ant'|'body', ant?, lastX, lastY }

canvas.addEventListener('mousedown', (e) => {
  const mx = e.clientX, my = e.clientY;

  // Check body first (higher priority since it's larger)
  if (distToBody(mx, my) <= 0) {
    drag = { type: 'body', lastX: mx, lastY: my };
    canvas.style.cursor = 'grabbing';
    return;
  }

  // Check ants — find nearest within pick radius
  let bestAnt = null, bestDist = 15;
  for (const ant of ants) {
    const d = Math.hypot(ant.x - mx, ant.y - my);
    if (d < bestDist) { bestDist = d; bestAnt = ant; }
  }
  if (bestAnt) {
    drag = { type: 'ant', ant: bestAnt, lastX: mx, lastY: my };
    bestAnt.state = 0;
    canvas.style.cursor = 'grabbing';
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (!drag) return;
  const mx = e.clientX, my = e.clientY;

  if (drag.type === 'ant') {
    drag.ant.x = mx;
    drag.ant.y = my;
    drag.ant.vx = (mx - drag.lastX) * 0.5;
    drag.ant.vy = (my - drag.lastY) * 0.5;
  } else if (drag.type === 'body') {
    const fdx = mx - drag.lastX, fdy = my - drag.lastY;
    const forceMag = 3.0;
    addForce(fdx * forceMag, fdy * forceMag, drag.lastX, drag.lastY);
  }

  drag.lastX = mx;
  drag.lastY = my;
});

canvas.addEventListener('mouseup', () => {
  drag = null;
  canvas.style.cursor = '';
});

canvas.addEventListener('mouseleave', () => {
  drag = null;
  canvas.style.cursor = '';
});

// ===================== INIT =====================

function init() {
  resize();
  initBody();
  initAnts();
  bindControls();
  lastFpsTime = performance.now();
  frame();
}

window.addEventListener('resize', () => {
  const oldAnts = ants;
  const oldBody = { ...body };
  resize();
  body = oldBody;
  ants = oldAnts;
});

init();

</script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experiments</title>
<style>
  body {
    margin: 0;
    padding: 48px 24px 64px;
    background: #111;
    color: #ccc;
    font: 16px/1.6 system-ui, -apple-system, sans-serif;
    max-width: 720px;
    margin-inline: auto;
  }
  h1 {
    font-weight: 500;
    font-size: 28px;
    color: #eee;
    margin: 0 0 8px;
  }
  .subtitle {
    color: #777;
    font-size: 14px;
    margin-bottom: 36px;
  }
  ul {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  li {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    padding: 18px 22px;
  }
  li a {
    color: #8cf;
    font-size: 18px;
    font-weight: 500;
    text-decoration: none;
  }
  li a:hover { text-decoration: underline; }
  .desc {
    margin: 10px 0 0;
    color: #aaa;
    font-size: 14px;
    line-height: 1.55;
  }
  .desc a { color: #8cf; }
  #status {
    color: #888;
    font-size: 14px;
    font-style: italic;
  }
</style>
</head>
<body>
<h1>Experiments</h1>
<p class="subtitle">Interactive simulations and visual demos.</p>
<ul id="experiments">
  <li id="status">Loading descriptions from README.md…</li>
</ul>
<script>
const EXPERIMENTS = ['ants.html', 'saccade.html'];

function linkify(text) {
  return text.replace(
    /(https?:\/\/[^\s]+)/g,
    '<a href="$1" target="_blank" rel="noopener">$1</a>'
  );
}

function parseReadme(text) {
  const descriptions = {};
  for (const line of text.split(/\r?\n/)) {
    const match = line.match(/^(\S+\.html):\s*(.+)$/);
    if (match) descriptions[match[1].toLowerCase()] = match[2].trim();
  }
  return descriptions;
}

function renderList(descriptions) {
  const list = document.getElementById('experiments');
  list.innerHTML = '';

  for (const file of EXPERIMENTS) {
    const desc = descriptions[file.toLowerCase()];
    const li = document.createElement('li');
    li.innerHTML =
      '<a href="' + file + '">' + file + '</a>' +
      (desc
        ? '<p class="desc">' + linkify(desc) + '</p>'
        : '<p class="desc"><em>No description in README.md</em></p>');
    list.appendChild(li);
  }
}

fetch('README.md')
  .then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.text();
  })
  .then(text => renderList(parseReadme(text)))
  .catch(() => {
    document.getElementById('experiments').innerHTML =
      '<li id="status">Could not load README.md. Serve this folder over HTTP ' +
      '(e.g. <code>python -m http.server</code>) to view descriptions.</li>';
  });
</script>
</body>
</html>
